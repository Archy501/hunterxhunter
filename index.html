<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Геолокація групи</title>

<style>

body{
font-family:Arial;
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

select,button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border-radius:8px;
}

button{
background:#2f7cff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d63d6;
}

#toast{
visibility:hidden;
background:#28a745;
color:white;
padding:14px;
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
border-radius:8px;
}

#toast.show{
visibility:visible;
}

</style>
</head>

<body>

<div class="card">

<h2>Відправити геолокацію</h2>

<form id="locationForm"
action="https://docs.google.com/forms/d/e/1FAIpQLSeO24YLALbSq50XDBhjNtzEClEpr4EfWaj8kJKqCsG8EZYxog/formResponse"
method="POST"
target="hiddenFrame">

<select name="entry.498498954" id="name">

<option value="">Оберіть ПІБ</option>

<option>ГОРЮК Віктор Дмитрович</option>
<option>ПЕТРАШИШЕН Богдан Євгенійович</option>
<option>ОГРЕБЧУК Сергій Георгійович</option>
<option>ДМИТРИШИН Орест Володимирович</option>

</select>

<input type="hidden" name="entry.744814946" id="lat">
<input type="hidden" name="entry.658629472" id="lon">
<input type="hidden" name="entry.1024492850" id="time">

<button type="button" onclick="sendLocation()">
📍 Відправити геолокацію
</button>

</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

</div>

<div id="toast">Місцезнаходження відправлено</div>

<script>

function sendLocation(){

let name=document.getElementById("name").value

if(name==""){
alert("Оберіть ПІБ")
return
}

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("lat").value=pos.coords.latitude
document.getElementById("lon").value=pos.coords.longitude
document.getElementById("time").value=new Date().toLocaleString()

document.getElementById("locationForm").submit()

let toast=document.getElementById("toast")
toast.className="show"

setTimeout(function(){
toast.className=""
},3000)

})

}

</script>

</body>
</html>
