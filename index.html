<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Геолокація групи</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
background:black;
}

/* космос */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 120s linear infinite;
opacity:0.6;
}

/* рух зірок */
@keyframes stars{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-2000px);
}

}

/* головна картка */

.card{
background:white;
padding:40px;
width:360px;
max-width:90vw;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
text-align:center;
position:relative;
z-index:2;
}

select,button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border-radius:8px;
}

button{
background:#2f7cff;
color:white;
border:none;
cursor:pointer;
}

button:disabled{
background:#9aa6c3;
cursor:not-allowed;
}

#toast{
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
background:#28a745;
color:white;
padding:10px 16px;
border-radius:8px;
display:none;
}

/* мобільні пристрої */

@media (max-width:600px){

.card{
width:92vw;
padding:50px 30px;
}

select,button{
font-size:18px;
padding:18px;
}

h2{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="card">

<div id="toast">Геолокація відправлена ✔</div>

<h2>Відправити геолокацію</h2>

<select id="name">

<option value="">Оберіть ПІБ</option>

<option>ПЕТРАШИШЕН Богдан Євгенійович</option>

<option>ЗВОНЕЦЬКИЙ Ілля Іванович</option>
<option>НІКІТА Андрій Васильович</option>
<option>ПІТИК Степан Тарасович</option>
<option>ПЛЕШКО Ілля Миколайович</option>
<option>КОСТЮК Дмитро Валерійович</option>
<option>ХУДОЯРОВ Іван Мадіярович</option>
<option>САВЮК Андрій Іванович</option>
<option>ДОНСЬКОЙ Андрій Сергійович</option>
<option>ТКАЧУК Віктор Вікторович</option>
<option>ЛИПНЮК Валерій Васильович</option>
<option>НЯГУ Анатолій Іванович</option>
<option>ЛЯХОМСЬКИЙ Іван Володимирович</option>
<option>МУНТЯН Степан Васильович</option>
<option>СЛИВКА Андрій Васильович</option>
<option>МІСЕВИЧ Ігор Миколайович</option>
<option>УРСАТІЙ Яким Якимович</option>
<option>НЕПІТ Микола Петрович</option>
<option>САКАЛЮК Сергій Васильович</option>
<option>СИРОТЮК Олексій Миколайович</option>
<option>МАТВЕЄВ Кирило Іванович</option>
<option>САВЧУК Ярослав Вікторович</option>
<option>ЯСИНІВСЬКИЙ Павло Захарович</option>
<option>ТОМЧУК Павло Павлович</option>
<option>ГОЛДАЙ Павло Андрійович</option>
<option>ЧАЛИЙ Василь Романович</option>

<option>ЖЕРНІК Дмитро Миколайович</option>

<option>ВІВЧАРУК Володимир Омелянович</option>
<option>СТОШ Артур Павлович</option>

</select>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSeO24YLALbSq50XDBhjNtzEClEpr4EfWaj8kJKqCsG8EZYxog/formResponse"
method="POST"
target="hiddenFrame">

<input type="hidden" name="entry.498498954" id="nameField">
<input type="hidden" name="entry.744814946" id="latField">
<input type="hidden" name="entry.658629472" id="lonField">
<input type="hidden" name="entry.1024492850" id="timeField">

</form>

<button id="sendBtn" onclick="sendLocation()">
📍 Відправити геолокацію
</button>

<iframe name="hiddenFrame" style="display:none;"></iframe>

</div>

<script>

function sendLocation(){

var name=document.getElementById("name").value

if(name===""){
alert("Оберіть ПІБ")
return
}

var btn=document.getElementById("sendBtn")

btn.disabled=true
btn.innerHTML="Дякую!"

navigator.geolocation.getCurrentPosition(function(pos){

document.getElementById("nameField").value=name
document.getElementById("latField").value=pos.coords.latitude
document.getElementById("lonField").value=pos.coords.longitude
document.getElementById("timeField").value=new Date().toLocaleString()

document.getElementById("form").submit()

showToast()

})

setTimeout(function(){

btn.disabled=false
btn.innerHTML="📍 Відправити геолокацію"

},60000)

}

function showToast(){

var toast=document.getElementById("toast")

toast.style.display="block"

setTimeout(function(){
toast.style.display="none"
},3000)

}

</script>

</body>
</html>
