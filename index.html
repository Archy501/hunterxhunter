<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Геолокація групи</title>

<style>

body{
font-family:Arial;
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
position:relative;
}

select,button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border-radius:8px;
}

button{
background:#2f7cff;
color:white;
border:none;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d63d6;
}

button:disabled{
background:#9aa6c3;
cursor:not-allowed;
}

#toast{
position:absolute;
top:-10px;
left:50%;
transform:translate(-50%,-100%);
background:#28a745;
color:white;
padding:10px 18px;
border-radius:8px;
opacity:0;
transition:0.3s;
font-size:14px;
}

#toast.show{
opacity:1;
transform:translate(-50%,-120%);
}

</style>
</head>

<body>

<div class="card">

<div id="toast">Геолокація відправлена ✔</div>

<h2>Відправити геолокацію</h2>

<select id="name">

<option value="">Оберіть ПІБ</option>

<option>ПЕТРАШИШЕН Богдан Євгенійович</option>
<option>ОГРЕБЧУК Сергій Георгійович</option>
<option>ГЛИВКА Андрій Ярославович</option>
<option>ПОРУТЧИК Дмитро Миколайович</option>
<option>ЗВОНЕЦЬКИЙ Ілля Іванович</option>
<option>НІКІТА Андрій Васильович</option>
<option>ПІТИК Степан Тарасович</option>
<option>ПЛЕШКО Ілля Миколайович</option>
<option>КОСТЮК Дмитро Валерійович</option>
<option>ХУДОЯРОВ Іван Мадіярович</option>
<option>САВЮК Андрій Іванович</option>
<option>ДОНСЬКОЙ Андрій Сергійович</option>
<option>ТКАЧУК Віктор Вікторович</option>
<option>ЛИПНЮК Валерій Васильович</option>
<option>НЯГУ Анатолій Іванович</option>
<option>ЛЯХОМСЬКИЙ Іван Володимирович</option>
<option>МУНТЯН Степан Васильович</option>
<option>СЛИВКА Андрій Васильович</option>
<option>МІСЕВИЧ Ігор Миколайович</option>
<option>УРСАТІЙ Яким Якимович</option>
<option>НЕПІТ Микола Петрович</option>
<option>САКАЛЮК Сергій Васильович</option>
<option>СИРОТЮК Олексій Миколайович</option>
<option>МАТВЕЄВ Кирило Іванович</option>
<option>САВЧУК Ярослав Вікторович</option>
<option>ЯСИНІВСЬКИЙ Павло Захарович</option>
<option>ТОМЧУК Павло Павлович</option>
<option>ГОЛДАЙ Павло Андрійович</option>
<option>ЧАЛИЙ Василь Романович</option>
<option>ЯБЛОНСЬКИЙ Анатолій Миколайович</option>
<option>КОВАЛЬ Роман Станіславович</option>
<option>МЕЛЬНИК Сергій Вікторович</option>
<option>КОСТЕНЮК Дмитро Іванович</option>
<option>ЖЕРНІК Дмитро Миколайович</option>
<option>КАРБУНАР Денис Васильович</option>
<option>БАРАНОВ Андрій Васильович</option>
<option>РИБЧЕНКО Олександр Володимирович</option>
<option>ЗЕЛЕНКОВ Юрій Володимирович</option>
<option>ГАВРИЛЮК Олександр Васильович</option>
<option>КАЛЕНЮК Олексій Іванович</option>
<option>ШУЛЬГІН Володимир Анатолійович</option>
<option>ТОКАРЧУК Дмитро Яношевич</option>
<option>КОМЕНДАТ Тарас Сергійович</option>
<option>ТРОЯНОВСЬКИЙ Володимир Миколайович</option>
<option>ГЛАДКИЙ Вадим Миколайович</option>
<option>ЗАЗУБЕК Андрій Васильович</option>
<option>НОРІЦА Ігор Штефанович</option>
<option>ВІВЧАРУК Володимир Омелянович</option>
<option>СТОШ Артур Павлович</option>

</select>

<button id="sendBtn" onclick="sendLocation()">
📍 Відправити геолокацію
</button>

</div>

<script>

function sendLocation(){

let name=document.getElementById("name").value
let btn=document.getElementById("sendBtn")

if(name==""){
alert("Оберіть ПІБ")
return
}

navigator.geolocation.getCurrentPosition(function(pos){

let lat=pos.coords.latitude
let lon=pos.coords.longitude
let time=new Date().toLocaleString()

let data=new URLSearchParams()

data.append("entry.498498954",name)
data.append("entry.744814946",lat)
data.append("entry.658629472",lon)
data.append("entry.1024492850",time)

fetch("https://docs.google.com/forms/d/e/1FAIpQLSeO24YLALbSq50XDBhjNtzEClEpr4EfWaj8kJKqCsG8EZYxog/formResponse",{
method:"POST",
mode:"no-cors",
body:data
})

showToast()

btn.innerText="Дякую!"
btn.disabled=true

// розблокувати через 30 сек
setTimeout(function(){
btn.innerText="📍 Відправити геолокацію"
btn.disabled=false
},30000)

})

}

function showToast(){

let toast=document.getElementById("toast")

toast.classList.add("show")

setTimeout(function(){
toast.classList.remove("show")
},3000)

}

</script>

</body>
</html>
